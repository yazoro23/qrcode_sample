<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Group 1 · Weeks 1–5 QRCODE</title>
    <style>
/* =====================
   GLOBAL STYLES 
====================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #f2f0e8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', Courier, monospace;
    padding: 8px;
}

/* =====================
   QR CARD 
====================== */
.qr-card {
    max-width: 500px;
    width: 100%;
    background: white;
    border: 3px solid #222;
    box-shadow: 12px 12px 0 rgba(0,0,0,0.2);
    padding: 1.8rem 2rem 2rem 2rem;
    text-align: center;
    word-break: break-word;
}

/* =====================
   GROUP TITLE
====================== */
.group-title {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #1d3b5c;
    border-bottom: 3px dashed #aaa;
    padding-bottom: 0.3rem;
    margin-bottom: 0.8rem;
    font-family: 'Impact', 'Arial Black', 'Courier New', sans-serif;
    word-break: keep-all;
}

/* =====================
   WEEK LINE 
====================== */
.week-line {
    font-size: 1.7rem;
    font-weight: 600;
    margin: 0.5rem 0 1.2rem 0;
    color: #2c3e50;
    background: #fdeacb;
    display: inline-block;
    padding: 0.3rem 1.2rem;
    border-radius: 40px;
    border: 2px solid #b47c5e;
    font-family: 'Courier New', monospace;
    letter-spacing: 2px;
    max-width: 100%;
}

/* =====================
   QR CONTAINER
====================== */
.qr-container {
    margin: 1.5rem 0 1rem 0;
    display: flex;
    justify-content: center;
}

/* =====================
   QRCODE element
====================== */
#qrcode {
    border: 4px solid black;
    width: 200px;
    height: 200px;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

#qrcode img {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
}

/* =====================
   RESPONSIVE DESIGN
====================== */
@media (max-width: 450px) {
    .qr-card {
        padding: 1.2rem 1rem 1.5rem 1rem;
    }

    .group-title {
        font-size: clamp(1.6rem, 8vw, 2.2rem);
    }

    .week-line {
        font-size: clamp(1.2rem, 6vw, 1.7rem);
        padding: 0.3rem 0.8rem;
        white-space: normal;
        line-height: 1.3;
    }

    #qrcode {
        width: 180px;
        height: 180px;
    }
}

@media (max-width: 360px) {
    .qr-card {
        padding: 1rem 0.8rem 1.2rem 0.8rem;
    }
    #qrcode {
        width: 160px;
        height: 160px;
    }
    .group-title {
        font-size: 1.5rem;
    }
    .week-line {
        font-size: 1.2rem;
        padding: 0.2rem 0.5rem;
    }
}
    </style>
</head>
<body>
    <div class="qr-card">
        <div class="qr-container">
            <div id="qrcode"></div>
        </div>
        
        <div class="group-title">GROUP 1</div>

        <div class="week-line">WEEK 1, 2, 3, 4, 5</div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        window.addEventListener('DOMContentLoaded', function() {
            const targetLink = "https://surl.li/ltpfhg";
            const qrCodeContainer = document.getElementById('qrcode');
            qrCodeContainer.innerHTML = '';
            
            const qrCode = new QRCode(qrCodeContainer, {
                text: targetLink,
                width: 192,
                height: 192,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.M
            });

        });
    </script>
</body>
</html>
